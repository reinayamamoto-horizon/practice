<!DOCTYPE html>
<html lang="ja">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/reset.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% if VITE_DEV_SERVER_URL %}
    <link rel="stylesheet" href="{{ VITE_DEV_SERVER_URL }}/config/static/css/input.css" />
    {% else %}
    <link rel="stylesheet" href="{% static 'dist/assets/input.css' %}" />
    {% endif %}
    <title>キャラクター</title>
    <style>
        .todo { margin: 10px 0; }
        .bar {
            position: fixed;
            top: 60px;
            left: 40px;
            width: 300px;
            height: 16px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            z-index: 50;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4af, #8ff);
            transition: width 0.4s ease;
        }
        .level-label {
            position: fixed;
            top: 32px;
            left: 40px;
            color: #fff;
            font-weight: 700;
            z-index: 50;
        }
        .orb {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #aef, #3af);
            pointer-events: none;
            animation: move 0.8s ease forwards;
            box-shadow: 0 0 10px #6cf;
            z-index: 60;
        }
        @keyframes move {
            to {
                transform: translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div >
        <header>
            <p class="level-label" id="level">Lv. 1 (0%)</p>
            <div class="bar" id="bar">
                <div class="bar-fill" id="fill"></div>
            </div>
        </header>

        <main class="px-10 pt-4 text-black mt-40 h-[320px]">
            <h2 class="text-xl mb-4">Todo</h2>
            <div class="todo" data-rank="A">
                タスク1 <button type="button" onclick="completeTodo(this)">完了</button>
            </div>
            <div class="todo" data-rank="B">
                タスク2 <button type="button" onclick="completeTodo(this)">完了</button>
            </div>
            <div class="todo" data-rank="C">
                タスク3 <button type="button" onclick="completeTodo(this)">完了</button>
            </div>
        </main>

        <button class="sab-fonts m-14 text-white" type="button" onclick="history.back()">
            &lt; back
        </button>

    </div>

    <script>
        let exp = 0;
        let level = 1;
        const gainByRank = { A: 40, B: 25, C: 10 };

        function renderStatus() {
            const fill = document.getElementById("fill");
            const levelEl = document.getElementById("level");
            if (!fill || !levelEl) return;
            fill.style.width = exp + "%";
            levelEl.textContent = `Lv. ${level} (${exp}%)`;
        }

        function completeTodo(btn) {
            const todo = btn.parentElement;
            const bar = document.getElementById("bar");
            const fill = document.getElementById("fill");
            if (!todo || !bar || !fill) return;
            const rank = todo.dataset.rank || "C";
            const gain = gainByRank[rank] ?? 10;

            const start = btn.getBoundingClientRect();
            const end = bar.getBoundingClientRect();

            const orb = document.createElement("div");
            orb.className = "orb";
            orb.style.left = start.left + "px";
            orb.style.top = start.top + "px";

            const dx = end.left - start.left;
            const dy = end.top - start.top;
            orb.style.setProperty("--dx", dx + "px");
            orb.style.setProperty("--dy", dy + "px");

            document.body.appendChild(orb);
            todo.remove();
            setTimeout(() => {
                orb.remove();
                exp += gain;
                while (exp >= 100) {
                    exp -= 100;
                    level += 1;
                }
                renderStatus();
            }, 800);
        }

        renderStatus();
    </script>
</body>
</html>
